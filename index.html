<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Project Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #222;
      color: white;
      padding: 30px;
      text-align: center;
    }

    main {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: #222;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .project-card:hover {
      transform: translateY(-3px);
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>
  <header>
    <h1>My Project Hub</h1>
    <p>Quick access to my HTML projects and teaching tools</p>
  </header>

  <main>
    <div class="project-grid">

      <a class="project-card" href="#">
        <h2>Project 1</h2>
        <p>Coming soon.</p>
      </a>

      <a class="project-card" href="#">
        <h2>Project 2</h2>
        <p>Coming soon.</p>
      </a>

      <a class="project-card" href="#">
        <h2>Project 3</h2>
        <p>Coming soon.</p>
      </a>

    </div>
  </main>

  <footer>
    <p>Created by CMazzetti</p>
  </footer>
</body>
</html>
